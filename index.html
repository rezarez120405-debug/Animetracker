<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimePicker - Temukan Tontonanmu</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        .anime-card { transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .loader { border-top-color: #3b82f6; animation: spinner 1s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex flex-col items-center">

    <div class="max-w-md w-full px-6 py-12 flex-grow">
        <div class="text-center mb-10">
            <div class="inline-block bg-blue-600/10 p-4 rounded-3xl mb-4 shadow-inner">
                <i class="fas fa-rocket text-3xl text-blue-500"></i>
            </div>
            <h1 class="text-3xl font-extrabold text-white tracking-tighter uppercase italic">
                Anime<span class="text-blue-500">Picker</span>
            </h1>
            <p class="text-slate-500 text-sm mt-2 font-medium">Temukan petualangan barumu hari ini!</p>
        </div>

        <div class="bg-slate-900 p-6 rounded-[2rem] border border-slate-800 shadow-2xl mb-8">
            <div class="mb-6 text-center">
                <label class="text-[10px] font-black uppercase text-slate-500 tracking-[0.2em]">Pilih Kategori</label>
                <select id="typeFilter" class="mt-3 w-full bg-slate-800 border border-slate-700 rounded-2xl px-4 py-4 outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm text-white appearance-none text-center font-bold">
                    <option value="tv">📺 Series (Eps)</option>
                    <option value="movie">🎬 Movie</option>
                    <option value="">🌀 Campuran</option>
                </select>
            </div>

            <button id="fetchBtn" class="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white rounded-2xl font-black shadow-lg shadow-blue-900/40 active:scale-95 transition-all flex items-center justify-center gap-3 uppercase text-xs tracking-wider">
                <i class="fas fa-random text-lg"></i> Gacha Sekarang
            </button>
        </div>

        <div id="loading" class="hidden flex flex-col items-center justify-center my-10 fade-in">
            <div class="loader w-12 h-12 border-4 border-slate-800 rounded-full mb-4"></div>
            <p id="loadingText" class="text-[10px] text-slate-500 font-black uppercase tracking-[0.3em]">Menghubungkan ke Pusat Data...</p>
        </div>

        <div id="animeResult" class="hidden fade-in">
            <div class="anime-card bg-slate-900 rounded-[2.5rem] overflow-hidden border border-slate-800 shadow-2xl">
                <div class="relative h-80">
                    <img id="animeImg" src="" alt="Poster" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-transparent text-transparent"></div>
                    <div id="animeRating" class="absolute top-5 right-5 bg-yellow-400 text-slate-950 font-black px-4 py-1.5 rounded-full text-sm shadow-xl flex items-center gap-1">
                        ⭐ 0.0
                    </div>
                </div>
                
                <div class="p-8 -mt-12 relative">
                    <p id="animeTitleJP" class="text-blue-400 text-[10px] font-bold mb-1 uppercase tracking-widest truncate"></p>
                    <h2 id="animeTitle" class="text-2xl font-black text-white mb-4 leading-tight italic">Judul Anime</h2>
                    
                    <div class="flex flex-wrap gap-2 mb-6">
                        <span id="animeEpisodes" class="bg-slate-800 text-slate-300 text-[10px] font-bold px-3 py-1.5 rounded-lg border border-slate-700 uppercase italic">0 Eps</span>
                        <span id="animeStatus" class="bg-slate-800 text-slate-300 text-[10px] font-bold px-3 py-1.5 rounded-lg border border-slate-700 uppercase italic">Status</span>
                    </div>

                    <div class="bg-slate-950/50 p-6 rounded-[1.5rem] border border-slate-800/50 mb-6 shadow-inner">
                        <p id="animeSynopsis" class="text-slate-400 text-xs leading-relaxed italic"></p>
                        <button id="translateBtn" class="mt-5 w-full py-3 bg-blue-600/10 text-blue-400 hover:bg-blue-600 hover:text-white rounded-xl font-black text-[10px] uppercase transition-all flex items-center justify-center gap-2 tracking-widest border border-blue-600/20">
                            <i class="fas fa-language text-sm"></i> Terjemahkan
                        </button>
                    </div>
                    
                    <a id="malLink" href="#" target="_blank" class="flex items-center justify-center gap-2 w-full py-4 bg-slate-800/50 hover:bg-slate-800 text-white rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all border border-slate-700">
                        <i class="fab fa-medium-m text-blue-400"></i> Lihat Detail di MyAnimeList
                    </a>
                </div>
            </div>
        </div>

        <footer class="mt-16 border-t border-slate-900 pt-8 pb-4 text-center">
            <p class="text-[9px] font-black text-slate-600 uppercase tracking-[0.3em] mb-6">Didukung Oleh Teknologi Hebat</p>
            <div class="flex flex-wrap justify-center items-center gap-8 opacity-40 grayscale hover:grayscale-0 transition-all duration-500">
                <div class="flex flex-col items-center">
                    <i class="fas fa-database text-xl mb-1"></i>
                    <span class="text-[8px] font-bold">Jikan API</span>
                </div>
                <div class="flex flex-col items-center">
                    <i class="fas fa-list text-xl mb-1"></i>
                    <span class="text-[8px] font-bold">MyAnimeList</span>
                </div>
                <div class="flex flex-col items-center">
                    <i class="fas fa-globe text-xl mb-1"></i>
                    <span class="text-[8px] font-bold">MyMemory</span>
                </div>
            </div>
            <p class="mt-8 text-[10px] text-slate-700 font-medium italic">
                Dibuat dengan ❤️ untuk komunitas Anime Indonesia.
            </p>
        </footer>
    </div>

    <script>
        const fetchBtn = document.getElementById('fetchBtn');
        const typeFilter = document.getElementById('typeFilter');
        const loading = document.getElementById('loading');
        const loadingText = document.getElementById('loadingText');
        const result = document.getElementById('animeResult');
        const translateBtn = document.getElementById('translateBtn');
        
        let currentSynopsis = ""; 

        // Pesan-pesan interaktif saat loading/error
        const busyMessages = [
            "Waduh, pusat datanya lagi sibuk banget nih...",
            "Servernya lagi antri, sabar sebentar ya...",
            "Aduh, koneksinya agak macet, coba lagi ya!",
            "Pusat data lagi penuh, yuk ketuk lagi tombolnya!",
            "Maaf ya, database sedang beristirahat sebentar..."
        ];

        async function getRandomAnime() {
            loading.classList.remove('hidden');
            result.classList.add('hidden');
            loadingText.innerText = "Membuka Gerbang Database...";
            
            translateBtn.innerHTML = '<i class="fas fa-language text-sm"></i> Terjemahkan';
            translateBtn.classList.remove('bg-emerald-600', 'text-white', 'opacity-50');
            translateBtn.classList.add('bg-blue-600/10', 'text-blue-400');

            const type = typeFilter.value;
            const randomPage = Math.floor(Math.random() * 5) + 1;
            
            try {
                // Gunakan timeout sederhana agar tidak menunggu selamanya
                const response = await fetch(`https://api.jikan.moe/v4/top/anime?type=${type}&page=${randomPage}`);
                
                if (!response.ok) throw new Error("Busy");
                
                const data = await response.json();
                
                if (data.data && data.data.length > 0) {
                    const randomIndex = Math.floor(Math.random() * data.data.length);
                    displayAnime(data.data[randomIndex]);
                }
            } catch (error) {
                // JIKA SIBUK / ERROR: Tampilkan pesan interaktif
                const msg = busyMessages[Math.floor(Math.random() * busyMessages.length)];
                alert(msg);
                loadingText.innerText = "Gagal Terhubung. Coba Lagi!";
            } finally {
                loading.classList.add('hidden');
            }
        }

        function displayAnime(anime) {
            document.getElementById('animeTitle').innerText = anime.title;
            document.getElementById('animeTitleJP').innerText = anime.title_japanese || "TITEL JEPANG TIDAK ADA";
            document.getElementById('animeImg').src = anime.images.jpg.large_image_url;
            document.getElementById('animeRating').innerHTML = `<i class="fas fa-star text-yellow-500 mr-1"></i> ${anime.score || 'N/A'}`;
            document.getElementById('animeEpisodes').innerText = `${anime.episodes || '?'} Episodes`;
            document.getElementById('animeStatus').innerText = anime.status;
            
            currentSynopsis = anime.synopsis || "No synopsis available.";
            document.getElementById('animeSynopsis').innerText = currentSynopsis;
            document.getElementById('malLink').href = anime.url;

            result.classList.remove('hidden');
            // Scroll otomatis ke hasil
            result.scrollIntoView({ behavior: 'smooth' });
        }

        async function translateText() {
            if (!currentSynopsis || translateBtn.classList.contains('opacity-50')) return;
            
            translateBtn.innerHTML = '<i class="fas fa-circle-notch animate-spin"></i> Menghubungi Penerjemah...';
            
            const safeText = currentSynopsis.length > 450 
                ? currentSynopsis.substring(0, 450) + "..." 
                : currentSynopsis;
            
            const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(safeText)}&langpair=en|id`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                
                if (data.responseData && data.responseData.translatedText) {
                    document.getElementById('animeSynopsis').innerText = data.responseData.translatedText;
                    translateBtn.innerHTML = '<i class="fas fa-check text-emerald-400"></i> Selesai!';
                    translateBtn.classList.replace('bg-blue-600/10', 'bg-emerald-600');
                    translateBtn.classList.replace('text-blue-400', 'text-white');
                    translateBtn.classList.add('opacity-50');
                }
            } catch (e) {
                translateBtn.innerText = "Waduh, Gagal Terjemah!";
            }
        }

        fetchBtn.addEventListener('click', getRandomAnime);
        translateBtn.addEventListener('click', translateText);
    </script>
</body>
</html>
