<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimePicker - Gacha Tontonanmu!</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AnimePicker">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        .anime-card { transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .loader { border-top-color: #3b82f6; animation: spinner 1s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        input[type="checkbox"]:checked + label {
            background-color: #2563eb;
            color: white;
            border-color: #3b82f6;
        }
        
        .logo-ap {
            width: 60px; height: 60px;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            border-radius: 18px;
            font-weight: 900; font-size: 24px; color: white;
            box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.4);
        }

        .genre-grid::-webkit-scrollbar { width: 4px; }
        .genre-grid::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex flex-col items-center">

    <div class="max-w-md w-full px-6 py-12 flex-grow">
        <div class="flex flex-col items-center text-center mb-10">
            <div class="logo-ap mb-4">AP</div>
            <h1 class="text-3xl font-extrabold text-white tracking-tighter uppercase italic">
                Anime<span class="text-blue-500">Picker</span>
            </h1>
            <p class="text-slate-500 text-[11px] mt-2 font-bold uppercase tracking-[0.2em]">Bosan Memilih? Biar Kami Yang Pilihkan.</p>
        </div>

        <div class="bg-slate-900 p-6 rounded-[2.5rem] border border-slate-800 shadow-2xl mb-8">
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="text-center">
                    <label class="text-[9px] font-black uppercase text-slate-600 tracking-widest text-center font-bold">Format</label>
                    <select id="typeFilter" class="mt-2 w-full bg-slate-800 border border-slate-700 rounded-xl px-2 py-3 outline-none focus:ring-2 focus:ring-blue-500 text-xs text-white font-bold appearance-none text-center">
                        <option value="tv">Series</option>
                        <option value="movie">Movie</option>
                        <option value="">Semua</option>
                    </select>
                </div>
                <div class="text-center">
                    <label class="text-[9px] font-black uppercase text-slate-600 tracking-widest text-center font-bold">Studio</label>
                    <select id="studioFilter" class="mt-2 w-full bg-slate-800 border border-slate-700 rounded-xl px-2 py-3 outline-none focus:ring-2 focus:ring-blue-500 text-xs text-white font-bold appearance-none text-center">
                        <option value="">Semua</option>
                        <option value="569">MAPPA</option>
                        <option value="801">ufotable</option>
                        <option value="21">Ghibli</option>
                        <option value="11">Madhouse</option>
                        <option value="2">Kyoto Ani</option>
                        <option value="18">Toei</option>
                        <option value="56">Wit Studio</option>
                    </select>
                </div>
            </div>

            <div class="mb-6 text-center">
                <label class="text-[9px] font-black uppercase text-slate-600 tracking-widest mb-3 block font-bold">Pilih Genre</label>
                <div class="genre-grid grid grid-cols-3 gap-2 max-h-48 overflow-y-auto p-1">
                    <div class="flex"><input type="checkbox" id="g1" value="1" class="hidden"><label for="g1" class="w-full text-center py-2 bg-slate-800 border border-slate-700 rounded-lg text-[9px] font-bold cursor-pointer transition-all uppercase">Action</label></div>
                    <div class="flex"><input type="checkbox" id="g2" value="2" class="hidden"><label for="g2" class="w-full text-center py-2 bg-slate-800 border border-slate-700 rounded-lg text-[9px] font-bold cursor-pointer transition-all uppercase">Adventure</label></div>
                    <div class="flex"><input type="checkbox" id="g4" value="4" class="hidden"><label for="g4" class="w-full text-center py-2 bg-slate-800 border border-slate-700 rounded-lg text-[9px] font-bold cursor-pointer transition-all uppercase">Comedy</label></div>
                    <div class="flex"><input type="checkbox" id="g8" value="8" class="hidden"><label for="g8" class="w-full text-center py-2 bg-slate-800 border border-slate-700 rounded-lg text-[9px] font-bold cursor-pointer transition-all uppercase">Drama</label></div>
                    <div class="flex"><input type="checkbox" id="g10" value="10" class="hidden"><label for="g10" class="w-full text-center py-2 bg-slate-800 border border-slate-700 rounded-lg text-[9px] font-bold cursor-pointer transition-all uppercase">Fantasy</label></div>
                    <div class="flex"><input type="checkbox" id="g22" value="22" class="hidden"><label for="g22" class="w-full text-center py-2 bg-slate-800 border border-slate-700 rounded-lg text-[9px] font-bold cursor-pointer transition-all uppercase">Romance</label></div>
                </div>
            </div>

            <button id="fetchBtn" class="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white rounded-2xl font-black shadow-lg shadow-blue-900/40 active:scale-95 transition-all flex items-center justify-center gap-3 uppercase text-xs tracking-wider">
                <i class="fas fa-random text-lg"></i> Gacha Sekarang
            </button>
        </div>

        <div id="loading" class="hidden flex flex-col items-center justify-center my-10 fade-in">
            <div class="loader w-10 h-10 border-4 border-slate-800 rounded-full mb-4"></div>
            <p class="text-[9px] text-slate-500 font-black uppercase tracking-[0.3em]">Menyortir Database...</p>
        </div>

        <div id="animeResult" class="hidden fade-in">
            <div class="anime-card bg-slate-900 rounded-[2.5rem] overflow-hidden border border-slate-800 shadow-2xl relative">
                <div class="relative h-72">
                    <img id="animeImg" src="" alt="Poster" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-transparent text-transparent"></div>
                    <div id="animeRating" class="absolute top-4 right-4 bg-yellow-400 text-slate-950 font-black px-3 py-1 rounded-full text-[10px] shadow-xl">⭐ 0.0</div>
                    <button id="trailerBtn" class="hidden absolute bottom-14 right-4 bg-red-600 text-white p-3 rounded-full shadow-lg active:scale-90 transition-all"><i class="fab fa-youtube text-lg"></i></button>
                </div>
                
                <div class="p-8 -mt-12 relative">
                    <p id="animeTitleJP" class="text-blue-400 text-[9px] font-bold mb-1 truncate"></p>
                    <h2 id="animeTitle" class="text-xl font-black text-white mb-2 leading-tight">Judul Anime</h2>
                    <div id="animeDetails" class="flex flex-wrap gap-2 mb-4 text-[9px] font-bold text-slate-500 uppercase italic">
                        <span id="infoSeason">Season ?</span> • <span id="infoEpisodes">? Eps</span> • <span id="infoDuration">? Min</span>
                    </div>
                    <div id="animeGenres" class="flex flex-wrap gap-1.5 mb-6"></div>
                    <div id="animeSynopsis" class="text-slate-400 text-[11px] leading-relaxed italic mb-6 bg-slate-950/50 p-4 rounded-2xl border border-slate-800/50"></div>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <button id="translateBtn" class="py-3 bg-blue-600/10 text-blue-400 hover:bg-blue-600 hover:text-white rounded-xl font-black text-[9px] uppercase transition-all border border-blue-600/20">Terjemahkan</button>
                        <a id="malLink" href="#" target="_blank" class="flex items-center justify-center py-3 bg-slate-800 text-white rounded-xl text-[9px] font-black uppercase border border-slate-700">Link MAL</a>
                    </div>
                </div>
            </div>
        </div>

        <footer class="mt-12 border-t border-slate-900 pt-8 pb-4 text-center">
            
            <div id="pwaDownloadContainer" class="hidden mb-10 px-4">
                <button id="pwaDownloadBtn" class="w-full bg-gradient-to-r from-blue-600 to-blue-700 text-white py-4 rounded-2xl font-black text-[11px] uppercase tracking-widest shadow-[0_10px_20px_-5px_rgba(37,99,235,0.4)] flex items-center justify-center gap-3 active:scale-95 transition-all border border-blue-500/30">
                    <i class="fas fa-download text-lg"></i> Unduh & Instal APK Web
                </button>
                <p class="text-[8px] text-slate-500 mt-3 font-bold uppercase tracking-widest italic font-bold">Klik untuk memasang AnimePicker di layar utama HP kamu</p>
            </div>

            <p class="text-[9px] font-black text-slate-600 uppercase tracking-[0.3em] mb-4 font-bold">Support by s.id & dll</p>
            
            <div class="bg-slate-900/50 inline-block p-4 rounded-2xl border border-slate-800 shadow-inner mb-6 w-full">
                <p class="text-[10px] text-slate-400 font-bold mb-3 uppercase tracking-widest font-bold">Ada Masalah / Problem?</p>
                <a href="https://wa.me/6285147099404?text=Halo%20Creator%20AnimePicker..." target="_blank" class="inline-flex items-center gap-2 bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-3 rounded-xl text-[10px] font-black uppercase transition-all shadow-lg shadow-emerald-900/20">
                    <i class="fab fa-whatsapp text-lg"></i> Hubungi Creator
                </a>
            </div>

            <p class="text-[8px] text-slate-700 font-bold uppercase tracking-widest font-bold">
                Short URL by <span class="text-slate-500">S.id</span> • Built with ❤️
            </p>
        </footer>
    </div>

    <div id="videoModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/95 p-4">
        <div class="w-full max-w-xl bg-slate-900 rounded-3xl overflow-hidden relative shadow-2xl">
            <button id="closeModal" class="absolute top-4 right-4 text-white text-3xl z-10"><i class="fas fa-times-circle"></i></button>
            <div class="aspect-video"><iframe id="trailerFrame" class="w-full h-full" src="" frameborder="0" allowfullscreen></iframe></div>
        </div>
    </div>

    <script>
        const fetchBtn = document.getElementById('fetchBtn');
        const loading = document.getElementById('loading');
        const result = document.getElementById('animeResult');
        const trailerBtn = document.getElementById('trailerBtn');
        const videoModal = document.getElementById('videoModal');
        const translateBtn = document.getElementById('translateBtn');
        
        let currentSynopsis = ""; 
        let currentTrailerUrl = "";

        async function getRandomAnime() {
            loading.classList.remove('hidden');
            result.classList.add('hidden');
            trailerBtn.classList.add('hidden');
            
            const genres = Array.from(document.querySelectorAll('input[type="checkbox"]:checked')).map(el => el.value).join(',');
            const studio = document.getElementById('studioFilter').value;
            const type = document.getElementById('typeFilter').value;
            
            let apiUrl = `https://api.jikan.moe/v4/anime?type=${type}&order_by=score&sort=desc&page=${Math.floor(Math.random() * 2) + 1}`;
            if (genres) apiUrl += `&genres=${genres}`;
            if (studio) apiUrl += `&producers=${studio}`;
            
            try {
                const response = await fetch(apiUrl);
                const data = await response.json();
                if (data.data && data.data.length > 0) {
                    displayAnime(data.data[Math.floor(Math.random() * data.data.length)]);
                } else { alert("Coba ganti filter!"); }
            } catch (error) { alert("Error!"); }
            finally { loading.classList.add('hidden'); }
        }

        function displayAnime(anime) {
            document.getElementById('animeTitle').innerText = anime.title;
            document.getElementById('animeTitleJP').innerText = anime.title_japanese || "";
            document.getElementById('animeImg').src = anime.images.jpg.large_image_url;
            document.getElementById('animeRating').innerHTML = `⭐ ${anime.score || 'N/A'}`;
            document.getElementById('animeSynopsis').innerText = anime.synopsis || "No description.";
            currentSynopsis = anime.synopsis || "";
            document.getElementById('malLink').href = anime.url;
            document.getElementById('infoSeason').innerText = (anime.season ? anime.season + " " + anime.year : "N/A");
            document.getElementById('infoEpisodes').innerText = `${anime.episodes || '?'} Eps`;
            document.getElementById('infoDuration').innerText = anime.duration || "? Min";
            
            const gContainer = document.getElementById('animeGenres');
            gContainer.innerHTML = '';
            anime.genres.forEach(g => {
                const s = document.createElement('span');
                s.className = "bg-blue-600/10 text-blue-500 text-[8px] font-black px-2 py-1 rounded-md uppercase border border-blue-600/20";
                s.innerText = g.name;
                gContainer.appendChild(s);
            });

            if (anime.trailer && anime.trailer.embed_url) {
                currentTrailerUrl = anime.trailer.embed_url;
                trailerBtn.classList.remove('hidden');
            }
            result.classList.remove('hidden');
            result.scrollIntoView({ behavior: 'smooth' });
            translateBtn.innerHTML = "Terjemahkan";
            translateBtn.classList.remove('opacity-50', 'bg-emerald-600', 'text-white');
        }

        async function translateText() {
            if (!currentSynopsis || translateBtn.classList.contains('opacity-50')) return;
            translateBtn.innerHTML = "...";
            const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(currentSynopsis.substring(0, 450))}&langpair=en|id`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                document.getElementById('animeSynopsis').innerText = data.responseData.translatedText;
                translateBtn.innerHTML = "Selesai!";
                translateBtn.classList.add('opacity-50', 'bg-emerald-600', 'text-white');
            } catch (e) { translateBtn.innerText = "Error"; }
        }

        // --- PWA / INSTALL LOGIC ---
        let installPrompt;
        const pwaContainer = document.getElementById('pwaDownloadContainer');
        const pwaBtn = document.getElementById('pwaDownloadBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            installPrompt = e;
            pwaContainer.classList.remove('hidden');
        });

        pwaBtn.addEventListener('click', async () => {
            if (installPrompt) {
                installPrompt.prompt();
                const { outcome } = await installPrompt.userChoice;
                if (outcome === 'accepted') pwaContainer.classList.add('hidden');
                installPrompt = null;
            }
        });

        window.addEventListener('appinstalled', () => pwaContainer.classList.add('hidden'));

        trailerBtn.addEventListener('click', () => { document.getElementById('trailerFrame').src = currentTrailerUrl; videoModal.classList.remove('hidden'); });
        document.getElementById('closeModal').addEventListener('click', () => { videoModal.classList.add('hidden'); document.getElementById('trailerFrame').src = ""; });
        fetchBtn.addEventListener('click', getRandomAnime);
        translateBtn.addEventListener('click', translateText);
    </script>
</body>
</html>
